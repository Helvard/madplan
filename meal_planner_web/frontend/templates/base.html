<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meal Planner{% endblock %}</title>

    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
        /* Custom scrollbar for chat areas */
        .chat-messages::-webkit-scrollbar { width: 8px; }
        .chat-messages::-webkit-scrollbar-track { background: #f1f1f1; }
        .chat-messages::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        .chat-messages::-webkit-scrollbar-thumb:hover { background: #555; }

        /* htmx loading indicator */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: block; }
        .htmx-request.htmx-indicator { display: block; }

        /* Rotating meal photo background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: var(--bg-photo, none);
            background-size: cover;
            background-position: center;
            filter: blur(48px);
            transform: scale(1.05);
            z-index: -1;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(244, 240, 232, 0.72);
            z-index: -1;
        }
    </style>

    {% if background_photo_url %}
    <style>:root { --bg-photo: url('{{ background_photo_url }}'); }</style>
    {% endif %}

    {% block head %}{% endblock %}
</head>
<body>
    <div class="min-h-screen flex flex-col">
        {% include 'partials/navigation.html' %}

        <main class="flex-1">
            {% block content %}{% endblock %}
        </main>

        <footer class="bg-gray-800 text-white text-center py-4">
            <p class="text-sm">Meal Planner • Powered by Claude AI</p>
        </footer>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
